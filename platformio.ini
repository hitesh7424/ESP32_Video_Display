[env:esp32doit-devkit-v1]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; Build only the current stable file
build_src_filter =
    +<main.cpp>
    -<main_new.cpp>

build_flags =
    -Iinclude
    -Ilib

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.16.1

upload_speed = 921600
monitor_speed = 115200

board_build.filesystem = spiffs

[env:esp32doit-devkit-v1-new]
platform = espressif32
board = esp32doit-devkit-v1
framework = arduino

; Build only the new development file
build_src_filter =
    -<main.cpp>
    +<main_new.cpp>

build_flags =
    -Iinclude
    -Ilib

lib_deps =
    adafruit/Adafruit SSD1306 @ ^2.5.7
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit BusIO @ ^1.16.1

upload_speed = 921600
monitor_speed = 115200

board_build.filesystem = spiffs